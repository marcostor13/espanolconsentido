[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/create-booking"
  to = "/.netlify/functions/create-booking"
  status = 200
  force = true

[[redirects]]
  from = "/api/confirm-payment"
  to = "/.netlify/functions/confirm-payment"
  status = 200
  force = true

[[redirects]]
  from = "/api/seed-promocodes"
  to = "/.netlify/functions/seed-promocodes"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
